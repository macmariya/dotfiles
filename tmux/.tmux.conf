# =============================================================================
# tmux 設定ファイル
# macOS (Apple Silicon) + Ghostty 対応
# =============================================================================

# -----------------------------------------------------------------------------
# 端末・カラー設定
# -----------------------------------------------------------------------------
# 256色 + True Color (24bit) 対応
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -ag terminal-overrides ",xterm-ghostty:RGB"

# -----------------------------------------------------------------------------
# プレフィックスキー設定
# -----------------------------------------------------------------------------
# デフォルトは Ctrl+b
# Ctrl+a に変更したい場合は以下のコメントを外す
# unbind C-b
# set -g prefix C-a
# bind C-a send-prefix

# -----------------------------------------------------------------------------
# 基本動作設定
# -----------------------------------------------------------------------------
# ESC 遅延をなくす（Vim での Alt キー誤認識防止）
set -sg escape-time 0

# スクロールバッファ行数
set -g history-limit 50000

# フォーカスイベント（Vim の autoread 等に必要）
set -g focus-events on

# クリップボード連携（macOS pbcopy との統合）
set -g set-clipboard on

# マウス操作を有効化（スクロール・ペイン選択・ドラッグリサイズ）
set -g mouse on

# -----------------------------------------------------------------------------
# ウィンドウ・ペイン番号
# -----------------------------------------------------------------------------
# ウィンドウ番号を 1 始まりに
set -g base-index 1

# ペイン番号もウィンドウと同じく 1 始まりに統一
set -g pane-base-index 1

# ウィンドウを閉じたとき番号を詰める
set -g renumber-windows on

# -----------------------------------------------------------------------------
# キーバインド: ペイン分割
# -----------------------------------------------------------------------------
# | で左右分割（現在のパスを引き継ぐ）
bind | split-window -h -c "#{pane_current_path}"

# - で上下分割（現在のパスを引き継ぐ）
bind - split-window -v -c "#{pane_current_path}"

# デフォルトの " と % は残す
# bind '"' split-window -v -c "#{pane_current_path}"
# bind '%' split-window -h -c "#{pane_current_path}"

# 新しいウィンドウも現在のパスで開く
bind c new-window -c "#{pane_current_path}"

# -----------------------------------------------------------------------------
# キーバインド: ペイン移動（Vim 風）
# -----------------------------------------------------------------------------
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# -----------------------------------------------------------------------------
# キーバインド: ウィンドウ切り替え
# -----------------------------------------------------------------------------
# Shift + 左右矢印でウィンドウ切り替え（prefix 不要）
bind -n S-Left  previous-window
bind -n S-Right next-window

# -----------------------------------------------------------------------------
# キーバインド: ペインリサイズ（Alt + 矢印、prefix 不要）
# -----------------------------------------------------------------------------
bind -n M-Left  resize-pane -L 5
bind -n M-Right resize-pane -R 5
bind -n M-Up    resize-pane -U 5
bind -n M-Down  resize-pane -D 5

# -----------------------------------------------------------------------------
# コピーモード（vi キーバインド）
# -----------------------------------------------------------------------------
setw -g mode-keys vi

# v で選択開始、y でコピー（macOS pbcopy 連携）
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi y   send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi C-v send -X rectangle-toggle

# マウスドラッグでコピー後に pbcopy へ送る
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"

# -----------------------------------------------------------------------------
# ステータスバー
# -----------------------------------------------------------------------------
# ステータスバーを上部に配置
set -g status-position top

# 更新間隔（秒）
set -g status-interval 5

# 背景・文字色（Catppuccin Mocha カラースキームに合わせる）
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

# 左側: セッション名
set -g status-left-length 30
set -g status-left " #[fg=#89b4fa,bold]#S#[fg=#cdd6f4] "

# 右側: ホスト名 + 日時
set -g status-right-length 60
set -g status-right "#[fg=#a6e3a1] #H #[fg=#6c7086]│#[fg=#cdd6f4] %Y-%m-%d %H:%M "

# ウィンドウリスト（中央寄せ）
set -g status-justify centre

# アクティブウィンドウ
setw -g window-status-current-style "fg=#1e1e2e,bg=#89b4fa,bold"
setw -g window-status-current-format " #I:#W "

# 非アクティブウィンドウ
setw -g window-status-style "fg=#6c7086,bg=#1e1e2e"
setw -g window-status-format " #I:#W "

# アクティビティがあるウィンドウ
setw -g window-status-activity-style "fg=#f38ba8,bg=#1e1e2e"

# -----------------------------------------------------------------------------
# ペインボーダー
# -----------------------------------------------------------------------------
# アクティブペインのボーダー色
set -g pane-active-border-style "fg=#89b4fa"

# 非アクティブペインのボーダー色
set -g pane-border-style "fg=#313244"

# -----------------------------------------------------------------------------
# メッセージ・コマンドライン
# -----------------------------------------------------------------------------
set -g message-style "bg=#313244,fg=#cdd6f4"
set -g message-command-style "bg=#313244,fg=#cdd6f4"

# -----------------------------------------------------------------------------
# その他
# -----------------------------------------------------------------------------
# ウィンドウのタイトルを端末タイトルに同期
set -g set-titles on
set -g set-titles-string "#S / #W"

# アクティビティ通知を有効化
setw -g monitor-activity on
set -g visual-activity off
